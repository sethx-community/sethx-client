<section class="mx-auto max-w-7xl px-6 py-12">
  <p class="mb-4 text-sm uppercase tracking-[0.3em] text-frame">{{ content().kicker }}</p>
  <h1 class="mb-5 max-w-4xl text-3xl font-semibold text-white md:text-4xl">{{ content().title }}</h1>
  <p class="mb-10 max-w-3xl leading-8 text-text-muted">{{ content().intro }}</p>

  <div class="grid gap-4 md:grid-cols-3">
    <article *ngFor="let item of content().cards" class="rounded-2xl border border-trade-border bg-darkgray/60 p-5">
      <h2 class="mb-3 text-xl font-semibold text-white">{{ item.title }}</h2>
      <p class="leading-7 text-text-muted">{{ item.description }}</p>
    </article>
  </div>

  <article class="mt-8 rounded-2xl border border-frame bg-background/70 p-6">
    <h2 class="mb-3 text-2xl font-semibold text-white">{{ content().currentChoice }}</h2>
    <p class="mb-4 text-text-muted">{{ content().consentState }} <span class="text-white">{{ consent.state() }}</span></p>
    <div class="flex flex-wrap gap-3">
      <button type="button" class="rounded-xl bg-frame px-4 py-2 font-semibold text-black hover:bg-gold-shiny" (click)="consent.accept()">{{ content().accept }}</button>
      <button type="button" class="rounded-xl border border-trade-border px-4 py-2 text-textlight hover:border-white hover:text-white" (click)="consent.decline()">{{ content().decline }}</button>
      <button type="button" class="rounded-xl border border-trade-border px-4 py-2 text-textlight hover:border-white hover:text-white" (click)="consent.reset()">{{ content().reset }}</button>
    </div>
  </article>
</section>
