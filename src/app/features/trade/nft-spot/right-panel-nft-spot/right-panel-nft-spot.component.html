<div class="sethx-panel">
  <aside class="sethx-right-panel-stack">
    <section class="sethx-panel-section sethx-panel-card">
      <div class="sethx-panel-heading">Account Actions</div>
      <div class="sethx-panel-section-title">Select Account / Fee Token</div>
      <app-trade-settings class="block" [boxed]="false" [showContext]="false"></app-trade-settings>
    </section>

    <app-selected-order-actions
      [selectedOrder]="selected()"
      [orderId]="selected()?.orderId || ''"
      [sideLabel]="selected()?.side || ''"
      [isMine]="!!selected()?.isMine"
      [showFillAmount]="false"
      [fillButtonLabel]="acceptButtonLabel()"
      [fillDisabled]="selectedAcceptSafety().disabled"
      [fillDisabledReason]="selectedAcceptSafety().reason"
      [cancelDisabled]="selectedCancelSafety().disabled"
      [cancelDisabledReason]="selectedCancelSafety().reason"
      (fill)="acceptSelected()"
      (cancel)="cancelSelected()"
      (clear)="clearSelected()"
    ></app-selected-order-actions>

    <section class="sethx-panel-section sethx-panel-card">
      <div class="sethx-panel-heading">Trade Actions</div>
      <div class="sethx-panel-section-title">NFT Spot</div>
      <p class="sethx-panel-copy">
        Place an NFT bid or ask, or review the current fee estimate. Select an order in the ladder to accept or cancel it here.
      </p>
      <div class="grid gap-2">
        <button type="button" class="sethx-button-primary" (click)="openPlaceOrder()">Place Order</button>
        <button type="button" class="sethx-button-secondary" (click)="openFeeQuote()">Fee Quote</button>
      </div>
    </section>
  </aside>
</div>
