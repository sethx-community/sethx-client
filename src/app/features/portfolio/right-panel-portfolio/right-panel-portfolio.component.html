<div class="sethx-panel">
  <div class="h-2"></div>

  <aside class="h-full flex flex-col min-h-0 space-y-3">
    <section class="sethx-panel-section sethx-panel-card">
      <div class="sethx-panel-heading">Assets</div>
      <div class="sethx-panel-section-title">Select account / fee token</div>
      <app-trade-settings class="block" [boxed]="false" [showContext]="false"></app-trade-settings>
    </section>

    <section class="sethx-panel-section sethx-panel-card">
      <div class="sethx-panel-heading">Wallet Actions</div>
      <app-wallet-actions></app-wallet-actions>
    </section>
  </aside>
</div>
