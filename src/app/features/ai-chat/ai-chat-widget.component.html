<section class="rounded-2xl border border-trade-border bg-darkgray/60 p-4 shadow-lg">
  <div class="mb-3 flex items-center justify-between gap-3">
    <div>
      <h2 class="text-lg font-semibold text-white">{{ 'assistant.title' | t }}</h2>
      <p class="text-xs text-text-muted">{{ 'assistant.subtitle' | t }}</p>
    </div>
    <span class="rounded-full bg-frame px-2 py-1 text-xs font-semibold text-black">MVP shell</span>
  </div>

  <div class="mb-3 flex flex-wrap gap-2 text-xs">
    <button type="button" class="rounded-full border px-3 py-1" [class.border-frame]="mode() === 'protocol'" (click)="setMode('protocol')">Protocol</button>
    <button type="button" class="rounded-full border px-3 py-1" [class.border-frame]="mode() === 'user-context'" (click)="setMode('user-context')">My context</button>
    <button type="button" class="rounded-full border px-3 py-1" [class.border-frame]="mode() === 'crypto-education'" (click)="setMode('crypto-education')">Crypto education</button>
  </div>

  <div class="mb-3 max-h-56 space-y-3 overflow-y-auto pr-1">
    <div
      *ngFor="let message of messages()"
      class="rounded-xl p-3 text-sm"
      [class.bg-background]="message.role === 'assistant'"
      [class.bg-heading]="message.role === 'user'"
      [class.text-textlight]="message.role === 'assistant'"
      [class.text-white]="message.role === 'user'"
    >
      {{ message.content }}
    </div>
  </div>

  <div class="flex gap-2">
    <input
      class="min-w-0 flex-1 rounded-xl border border-trade-border bg-background px-3 py-2 text-sm text-white outline-none focus:border-frame"
      [placeholder]="'assistant.placeholder' | t"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      (keyup.enter)="send()"
    />
    <button class="rounded-xl bg-frame px-4 py-2 text-sm font-semibold text-black hover:bg-gold-shiny" (click)="send()">
      {{ 'assistant.send' | t }}
    </button>
  </div>
</section>
