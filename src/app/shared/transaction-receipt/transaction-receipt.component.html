@if (visible() && receipt) {
  <div class="rounded border bg-black/20 p-3 text-xs" [ngClass]="statusClass()">
    <div class="flex items-center justify-between gap-3">
      <div class="font-semibold text-white">{{ receipt.title || statusLabel() }}</div>
      <div class="rounded-full border px-2 py-0.5 text-[10px] uppercase tracking-[0.12em]" [ngClass]="statusClass()">{{ statusLabel() }}</div>
    </div>
    <div class="mt-1 leading-relaxed text-frame">{{ receipt.message }}</div>
    @if (receipt.txHash) {
      <div class="mt-2 space-y-1">
        <div class="flex items-center justify-between gap-2">
          <span class="text-text-muted">Tx hash</span>
          <button
            type="button"
            class="sethx-copy-button"
            [class.is-copied]="copied"
            [title]="copied ? 'Copied' : 'Copy transaction hash'"
            aria-label="Copy transaction hash"
            (click)="copyTxHash(receipt.txHash)"
          >
            <i class="fa-regular" [class.fa-copy]="!copied" [class.fa-circle-check]="copied" aria-hidden="true"></i>
          </button>
        </div>
        <div class="select-text break-all rounded border border-frame/40 bg-black/20 px-2 py-1 font-mono text-[11px] text-white">
          {{ receipt.txHash }}
        </div>
      </div>
    }
    @if (explorerUrl) {
      <a class="mt-2 inline-flex items-center rounded border border-frame px-2 py-1 text-[11px] text-white hover:border-white" [href]="explorerUrl" target="_blank" rel="noopener noreferrer">View on explorer</a>
    }
    @if (receipt.error) { <div class="mt-2 break-words text-down">{{ receipt.error }}</div> }
  </div>
}
