@if (flow.isOpen()) {
  <div class="sethx-modal-overlay" role="presentation" (click)="flow.close()">
    <div class="sethx-modal-shell sethx-order-modal-shell shadow-xl" (click)="$event.stopPropagation()">
      <ng-container
        *ngComponentOutlet="
          flow.state().component;
          inputs: { data: flow.state().data, onClose: onClose }
        "
      ></ng-container>
    </div>
  </div>
}
